preprocess:
  fs: 44100
  get_spec: get_spec
  num_freq_bins: 128
  num_time_bins: 64
  nperseg: 512
  noverlap: 256
  max_dur: 1000000000.0
  window_length: 0.01
  min_freq: 400.0
  max_freq: 10000.0
  spec_min_val: 2.0
  spec_max_val: 6.5
  mel: true
  time_stretch: false
  within_syll_normalize: false
  normalization_mode: global
  normalization_method: robust
  normalization_num_samples: 128
  normalization_seed: 0
  sampling_seed: 0
  log_window_indices: false
  real_preprocess_params:
    - min_freq
    - max_freq
    - spec_min_val
    - spec_max_val
  int_preprocess_params: []
  binary_preprocess_params:
    - mel
    - within_syll_normalize

data:
  batch_size: 32
  num_workers:
  shuffle_train: true
  shuffle_test: false
  min_spec_val:
  min_audio_energy:
  spec_cache_dir:
  audio_cache_size: 8
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2

training:
  lr: 0.001
  z_dim: 32
  model_precision: 10.0
  learn_observation_scale: false
  log_precision_min:
  log_precision_max:
  epochs: 2
  test_freq:
  save_freq: 1
  vis_freq:
  num_specs: 5
  gap:
    - 2
    - 6
  vis_filename: reconstruction.pdf
  posterior_type: diag
  conv_arch: residual
  decoder_type: upsample
  kl_beta: 1.0
  kl_warmup_epochs: 0
  compile_model: false
  trainer_kwargs: {}
  stopping_kwargs:
